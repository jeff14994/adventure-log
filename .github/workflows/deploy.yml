name: Deploy to GitHub Pages

# 每次推送到 main 就自動部署整個站台（純靜態，無需建置）
on:
  push:
    branches: [main]
  workflow_dispatch: # 也可在 Actions 頁面手動觸發

# 讓工作流程有權限發佈 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同時只跑一個部署，取消進行中的舊部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: . # 整個 repo 根目錄就是站台

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
